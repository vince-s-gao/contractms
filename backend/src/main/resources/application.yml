server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: contract-management
  
  main:
    allow-circular-references: true
  
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/contract_management?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:contract_user}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
  
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

jwt:
  secret: ${JWT_SECRET:change-this-jwt-secret-key-at-least-32-bytes}
  expiration: ${JWT_EXPIRATION:86400000}

app:
  upload-dir: ${APP_UPLOAD_DIR:/app/logs/uploads}
  bootstrap:
    demo-data: ${APP_BOOTSTRAP_DEMO_DATA:false}
    admin-password: ${APP_BOOTSTRAP_ADMIN_PASSWORD:ChangeMe123!}
    user-password: ${APP_BOOTSTRAP_USER_PASSWORD:ChangeMe123!}

logging:
  level:
    com.contract: INFO
    org.springframework.security: INFO
  file:
    name: logs/contract-management.log
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
