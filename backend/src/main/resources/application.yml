server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: contract-management
  
  main:
    allow-circular-references: true
  
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/contract_management?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:contract_user}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
  
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

app:
  upload-dir: ${APP_UPLOAD_DIR:/app/logs/uploads}
  security:
    allowed-origins: ${APP_SECURITY_ALLOWED_ORIGINS:http://127.0.0.1:5252,http://localhost:5252}
    jwt-min-secret-length: ${APP_SECURITY_JWT_MIN_SECRET_LENGTH:32}
    prod-db-min-password-length: ${APP_SECURITY_PROD_DB_MIN_PASSWORD_LENGTH:12}
  bootstrap:
    demo-data: ${APP_BOOTSTRAP_DEMO_DATA:false}
    admin-password: ${APP_BOOTSTRAP_ADMIN_PASSWORD:}
    user-password: ${APP_BOOTSTRAP_USER_PASSWORD:}

logging:
  level:
    com.contract: INFO
    org.springframework.security: INFO
  file:
    name: logs/contract-management.log
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
